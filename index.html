<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Águas de Joinville 2026</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #e9ecef;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
        }
        .container {
            background: white;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
            display: flex;
            flex-direction: column;
        }
        h2 { color: #0056b3; text-align: center; margin: 5px 0 15px; font-size: 1.4em; }
        h3 { font-size: 1em; margin: 10px 0 5px; color: #555; border-bottom: 1px solid #ddd; }
        
        .grid-tarifas {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
        }
        .input-group { margin-bottom: 5px; }
        label { display: block; font-weight: bold; font-size: 0.75em; margin-bottom: 2px; color: #666; }
        input {
            width: 100%;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.9em;
        }
        button {
            width: 100%;
            background-color: #28a745;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
            margin: 10px 0;
        }
        button:hover { background-color: #218838; }

        #resultado {
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 10px;
            font-size: 0.85em;
        }
        .item-faixa {
            display: flex;
            justify-content: space-between;
            margin-bottom: 3px;
        }
        .subtotal-box {
            background: #e7f3ff;
            padding: 5px;
            margin: 5px 0;
            border-radius: 4px;
            font-weight: bold;
        }
        .total {
            font-size: 1.3em;
            font-weight: bold;
            color: #d9534f;
            border-top: 2px solid #0056b3;
            margin-top: 8px;
            padding-top: 8px;
            text-align: right;
        }
        .scroll-area { max-height: 250px; overflow-y: auto; padding-right: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Simulador Joinville 2026</h2>
    
    <div class="input-group">
        <label>Consumo Estimado (m³):</label>
        <input type="number" id="consumoInput" placeholder="Ex: 13" step="0.01">
    </div>
    
    <button onclick="calcular()">CALCULAR TOTAL</button>

    <div class="scroll-area">
        <h3>Tarifas de Água</h3>
        <div class="grid-tarifas">
            <div class="input-group"><label>T. Fixa Água:</label><input type="number" id="tFixa" value="33.50"></div>
            <div class="input-group"><label>0 a 10m³:</label><input type="number" id="t1" value="1.43"></div>
            <div class="input-group"><label>11 a 15m³:</label><input type="number" id="t2" value="9.49"></div>
            <div class="input-group"><label>16 a 25m³:</label><input type="number" id="t3" value="9.54"></div>
            <div class="input-group"><label>26 a 35m³:</label><input type="number" id="t4" value="12.64"></div>
            <div class="input-group"><label>Acima 35m³:</label><input type="number" id="t5" value="13.07"></div>
        </div>

        <h3>Tarifas de Esgoto</h3>
        <div class="grid-tarifas">
            <div class="input-group"><label>T. Fixa Esgoto:</label><input type="number" id="tFixaEsg" value="27.94"></div>
            <div class="input-group"><label>% Variável:</label><input type="number" id="pEsg" value="100"></div>
        </div>

        <div id="resultado" style="display:none;">
            <div id="detalhes"></div>
            <div class="total" id="valorTotal"></div>
        </div>
    </div>
</div>

<script>
function calcular() {
    const consumo = parseFloat(document.getElementById('consumoInput').value) || 0;
    const fixaAgua = parseFloat(document.getElementById('tFixa').value);
    const fixaEsgoto = parseFloat(document.getElementById('tFixaEsg').value);
    const percEsgoto = parseFloat(document.getElementById('pEsg').value) / 100;
    
    const tarifas = [
        parseFloat(document.getElementById('t1').value),
        parseFloat(document.getElementById('t2').value),
        parseFloat(document.getElementById('t3').value),
        parseFloat(document.getElementById('t4').value),
        parseFloat(document.getElementById('t5').value)
    ];

    const limites = [10, 5, 10, 10, Infinity]; 
    const nomesFaixas = ["0-10", "11-15", "16-25", "26-35", "35+"];

    let consumoRestante = consumo;
    let totalVariavelAgua = 0;
    let html = `<strong>Detalhamento Água:</strong><br>`;
    html += `<div class="item-faixa"><span>Tarifa Fixa Água:</span> <span>R$ ${fixaAgua.toFixed(2)}</span></div>`;

    for (let i = 0; i < tarifas.length; i++) {
        if (consumoRestante > 0) {
            let consumoNaFaixa = Math.min(consumoRestante, limites[i]);
            let custoFaixa = consumoNaFaixa * tarifas[i];
            totalVariavelAgua += custoFaixa;
            html += `<div class="item-faixa"><span>Faixa ${nomesFaixas[i]} m³:</span> <span>R$ ${custoFaixa.toFixed(2)}</span></div>`;
            consumoRestante -= consumoNaFaixa;
        }
    }

    const subAgua = fixaAgua + totalVariavelAgua;
    const subVariavelEsgoto = totalVariavelAgua * percEsgoto;
    const subEsgoto = fixaEsgoto + subVariavelEsgoto;
    const totalGeral = subAgua + subEsgoto;

    html += `<div class="subtotal-box">Subtotal Água: R$ ${subAgua.toFixed(2)}</div>`;
    html += `<br><strong>Detalhamento Esgoto:</strong><br>`;
    html += `<div class="item-faixa"><span>Tarifa Fixa Esgoto:</span> <span>R$ ${fixaEsgoto.toFixed(2)}</span></div>`;
    html += `<div class="item-faixa"><span>Consumo Esgoto (${(percEsgoto*100)}%):</span> <span>R$ ${subVariavelEsgoto.toFixed(2)}</span></div>`;
    html += `<div class="subtotal-box">Subtotal Esgoto: R$ ${subEsgoto.toFixed(2)}</div>`;

    document.getElementById('detalhes').innerHTML = html;
    document.getElementById('valorTotal').innerHTML = `TOTAL CONTA: R$ ${totalGeral.toFixed(2)}`;
    document.getElementById('resultado').style.display = 'block';
}
</script>

</body>
</html>
