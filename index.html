<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Águas de Joinville</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            background: white;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 95%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
        }
        h2 { 
            color: #0056b3; 
            text-align: center; 
            margin: 0 0 20px 0; 
            font-size: 1.6em;
            border-bottom: 2px solid #e7f3ff;
            padding-bottom: 10px;
        }
        
        .main-layout {
            display: flex;
            gap: 25px;
            align-items: flex-start;
        }

        .config-side { flex: 1; }
        .result-side { 
            flex: 1; 
            background: #f8fbff; 
            padding: 15px; 
            border-radius: 8px; 
            border: 1px solid #ddecff;
            min-height: 380px;
        }

        .input-group { margin-bottom: 12px; }
        label { display: block; font-weight: bold; font-size: 0.8em; margin-bottom: 4px; color: #555; }
        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #cbd5e0;
            border-radius: 5px;
            font-size: 0.95em;
        }
        
        .grid-tarifas {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            width: 100%;
            background-color: #0056b3;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            margin: 15px 0;
            transition: background 0.2s;
        }
        button:hover { background-color: #004494; }

        .item-faixa {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
            font-size: 0.85em;
        }
        .subtotal-box {
            background: #e1efff;
            padding: 6px 10px;
            margin: 8px 0;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.9em;
            color: #004494;
        }
        .total {
            font-size: 1.5em;
            font-weight: bold;
            color: #d9534f;
            border-top: 3px solid #0056b3;
            margin-top: 15px;
            padding-top: 10px;
            text-align: right;
        }

        @media (max-width: 768px) {
            body { height: auto; overflow: auto; padding: 20px 0; }
            .main-layout { flex-direction: column; }
            .container { width: 90%; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Calculadora Águas de Joinville</h2>
    
    <div class="main-layout">
        <div class="config-side">
            <div class="input-group">
                <label style="color: #0056b3; font-size: 1em;">Consumo Mensal (m³):</label>
                <input type="number" id="consumoInput" placeholder="Ex: 13" step="0.01">
            </div>
            
            <button onclick="calcular()">CALCULAR VALOR</button>

            <div class="grid-tarifas">
                <div class="input-group"><label>Fixa Água (R$):</label><input type="number" id="tFixa" value="33.50"></div>
                <div class="input-group"><label>Fixa Esgoto (R$):</label><input type="number" id="tFixaEsg" value="27.94"></div>
                <div class="input-group"><label>Faixa 0-10:</label><input type="number" id="t1" value="1.43"></div>
                <div class="input-group"><label>Faixa 11-15:</label><input type="number" id="t2" value="9.49"></div>
                <div class="input-group"><label>Faixa 16-25:</label><input type="number" id="t3" value="9.54"></div>
                <div class="input-group"><label>Faixa 26-35:</label><input type="number" id="t4" value="12.64"></div>
                <div class="input-group"><label>Acima de 35:</label><input type="number" id="t5" value="13.07"></div>
                <div class="input-group"><label>% Esgoto:</label><input type="number" id="pEsg" value="100"></div>
            </div>
        </div>

        <div class="result-side" id="resultadoArea">
            <div id="instrucao" style="color: #666; text-align: center; margin-top: 100px;">
                Insira o consumo e clique em calcular para ver o detalhamento.
            </div>
            <div id="detalhes" style="display:none;"></div>
            <div class="total" id="valorTotal" style="display:none;"></div>
        </div>
    </div>
</div>

<script>
// Função auxiliar para formatar em moeda brasileira
function formatarBRL(valor) {
    return valor.toLocaleString('pt-br', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function calcular() {
    const consumo = parseFloat(document.getElementById('consumoInput').value) || 0;
    const fixaAgua = parseFloat(document.getElementById('tFixa').value);
    const fixaEsgoto = parseFloat(document.getElementById('tFixaEsg').value);
    const percEsgoto = parseFloat(document.getElementById('pEsg').value) / 100;
    
    const tarifas = [
        parseFloat(document.getElementById('t1').value),
        parseFloat(document.getElementById('t2').value),
        parseFloat(document.getElementById('t3').value),
        parseFloat(document.getElementById('t4').value),
        parseFloat(document.getElementById('t5').value)
    ];

    const limites = [10, 5, 10, 10, Infinity]; 
    const nomesFaixas = ["0-10", "11-15", "16-25", "26-35", "35+"];

    let consumoRestante = consumo;
    let totalVariavelAgua = 0;
    
    let html = `<strong style="color:#0056b3">Detalhamento Água</strong><br><br>`;
    html += `<div class="item-faixa"><span>Taxa Fixa Água:</span> <span>R$ ${formatarBRL(fixaAgua)}</span></div>`;

    for (let i = 0; i < tarifas.length; i++) {
        if (consumoRestante > 0) {
            let consumoNaFaixa = Math.min(consumoRestante, limites[i]);
            let custoFaixa = consumoNaFaixa * tarifas[i];
            totalVariavelAgua += custoFaixa;
            html += `<div class="item-faixa"><span>Consumo ${nomesFaixas[i]} m³:</span> <span>R$ ${formatarBRL(custoFaixa)}</span></div>`;
            consumoRestante -= consumoNaFaixa;
        }
    }

    const subAgua = fixaAgua + totalVariavelAgua;
    const subVariavelEsgoto = totalVariavelAgua * percEsgoto;
    const subEsgoto = fixaEsgoto + subVariavelEsgoto;
    const totalGeral = subAgua + subEsgoto;

    html += `<div class="subtotal-box">Total Água: R$ ${formatarBRL(subAgua)}</div>`;
    html += `<br><strong style="color:#0056b3">Detalhamento Esgoto</strong><br><br>`;
    html += `<div class="item-faixa"><span>Taxa Fixa Esgoto:</span> <span>R$ ${formatarBRL(fixaEsgoto)}</span></div>`;
    html += `<div class="item-faixa"><span>Variável Esgoto (${(percEsgoto*100)}%):</span> <span>R$ ${formatarBRL(subVariavelEsgoto)}</span></div>`;
    html += `<div class="subtotal-box">Total Esgoto: R$ ${formatarBRL(subEsgoto)}</div>`;

    document.getElementById('instrucao').style.display = 'none';
    const detalhesDiv = document.getElementById('detalhes');
    const totalDiv = document.getElementById('valorTotal');
    
    detalhesDiv.innerHTML = html;
    detalhesDiv.style.display = 'block';
    
    totalDiv.innerHTML = `TOTAL: R$ ${formatarBRL(totalGeral)}`;
    totalDiv.style.display = 'block';
}
</script>

</body>
</html>
